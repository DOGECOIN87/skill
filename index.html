<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Oswald:wght@700&family=Roboto+Condensed:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Roboto Condensed', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .game-container {
            display: flex;
            flex: 1;
            padding: 10px;
            gap: 10px;
            min-height: 0;
        }
        
        .paytable-column {
            width: 10%;
            min-width: 120px;
            display: flex;
            flex-direction: column;
            gap: 0;
            justify-content: space-between;
            height: 100%;
        }
        
        .paytable-content {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex: 1;
            justify-content: space-between;
        }
        
        .tier-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            border: 2px solid #444;
            padding: 6px 8px;
            height: 50px;
            gap: 8px;
        }
        
        .tier-symbol {
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .tier-symbol img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        
        .tier-value {
            font-family: 'VT323', monospace;
            font-size: 20px;
            color: #39ff14;
            text-shadow: 0 0 10px #39ff14;
            flex: 1;
            text-align: right;
        }
        
        .win-display {
            background: #000;
            border: 3px solid #444;
            padding: 15px;
            text-align: center;
            margin-top: 10px;
        }
        
        .win-label {
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            color: #888;
            text-transform: uppercase;
        }
        
        .win-value {
            font-family: 'VT323', monospace;
            font-size: 48px;
            color: #39ff14;
            text-shadow: 0 0 15px #39ff14;
            line-height: 1;
        }
        
        .more-games-btn {
            margin-top: auto;
            height: 80px;
            background: linear-gradient(to bottom, #555, #333);
            border: 3px solid #777;
            color: #fff;
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 0 #222;
            transition: all 0.1s;
        }
        
        .more-games-btn:hover {
            background: linear-gradient(to bottom, #666, #444);
        }
        
        .more-games-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #222;
        }
        
        .play-area {
            width: 90%;
            display: flex;
            flex-direction: column;
            background: #111;
            border: 3px solid #666;
            position: relative;
        }
        
        .grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            padding: 30px;
            position: relative;
        }
        
        .grid-cell {
            background: #1a1a1a;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
            overflow: hidden;
        }
        
        .grid-cell:hover {
            border-color: #666;
            background: #222;
        }
        
        .grid-cell.active {
            border-color: #39ff14;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
        }
        
        .grid-cell.wild {
            background: rgba(57, 255, 20, 0.2);
            border-color: #39ff14;
        }
        
        .cell-symbol {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px;
            transition: transform 0.15s ease-out;
        }
        
        .cell-symbol img {
            max-width: 150px;
            max-height: 150px;
            width: auto;
            height: auto;
            object-fit: contain;
        }
        
        .cell-symbol.wild-text {
            font-family: 'VT323', monospace;
            font-size: 24px;
            color: #39ff14;
            text-shadow: 0 0 10px #39ff14;
        }
        
        .status-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Oswald', sans-serif;
            font-size: 32px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 3px;
            pointer-events: none;
            z-index: 10;
        }
        
        .status-message.hidden {
            display: none;
        }
        
        .control-section {
            background: #000;
            border-top: 3px solid #39ff14;
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #0a0a0a;
        }
        
        .status-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .status-label {
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            color: #888;
            text-transform: uppercase;
        }
        
        .status-value {
            font-family: 'VT323', monospace;
            font-size: 36px;
            padding: 5px 20px;
            background: #000;
            border: 2px solid #444;
            min-width: 100px;
            text-align: center;
        }
        
        .play-level-value {
            color: #ffaa00;
            text-shadow: 0 0 10px #ffaa00;
        }
        
        .points-value {
            color: #39ff14;
            text-shadow: 0 0 10px #39ff14;
        }
        
        .button-bar {
            display: flex;
            gap: 10px;
            padding: 15px 30px;
            background: #111;
        }
        
        .game-btn {
            flex: 1;
            height: 70px;
            background: linear-gradient(to bottom, #666, #444);
            border: 2px solid #888;
            border-radius: 5px;
            color: #fff;
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 0 #222, inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.05s;
        }
        
        .game-btn:hover {
            background: linear-gradient(to bottom, #777, #555);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #222, inset 0 1px 0 rgba(255,255,255,0.2);
        }
        
        .game-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #222, inset 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .game-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .game-btn.play {
            background: linear-gradient(to bottom, #00aa00, #006600);
            border-color: #00ff41;
            flex: 1.2;
        }
        
        .game-btn.play:hover {
            background: linear-gradient(to bottom, #00bb00, #007700);
        }
        
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 30px;
            background: #000;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 12px;
            color: #555;
        }
        
        .timer-container {
            position: absolute;
            top: 10px;
            left: 30px;
            right: 30px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }
        
        .timer-container.active {
            display: block;
        }
        
        .timer-bar {
            height: 100%;
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00);
            width: 100%;
            transition: width 0.1s linear;
        }
        
        .memory-circle {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        
        .memory-circle.active {
            opacity: 1;
            box-shadow: 0 0 30px currentColor;
        }
        
        .memory-circle.color-0 { background: #ff0000; color: #ff0000; }
        .memory-circle.color-1 { background: #00ff00; color: #00ff00; }
        .memory-circle.color-2 { background: #0000ff; color: #0000ff; }
        .memory-circle.color-3 { background: #ffff00; color: #ffff00; }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes spinVertical {
            0% { transform: translateY(0px); opacity: 1; }
            25% { transform: translateY(-50px); opacity: 0.7; }
            50% { transform: translateY(-100px); opacity: 0.3; }
            75% { transform: translateY(-50px); opacity: 0.7; }
            100% { transform: translateY(0px); opacity: 1; }
        }
        
        @keyframes spinBlur {
            0% { filter: blur(0px); transform: scale(1); }
            50% { filter: blur(3px); transform: scale(0.95); }
            100% { filter: blur(0px); transform: scale(1); }
        }
        
        .grid-cell.spinning {
            border-color: #39ff14;
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
        }
        
        .grid-cell.spinning .cell-symbol {
            animation: spinVertical 0.15s ease-in-out infinite, spinBlur 0.3s ease-in-out infinite;
        }
        
        .winning-cell {
            animation: pulse 0.5s ease-in-out infinite;
            border-color: #39ff14 !important;
            box-shadow: 0 0 30px #39ff14 !important;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="paytable-column">
            <div class="paytable-content">
                <div class="tier-row">
                    <div class="tier-symbol"><img src="/symbols/alon.png" alt="Alon"></div>

                    <div class="tier-symbol"><img src="/symbols/pump-pill.png" alt="Pump Pill"></div>

        <div class="play-area">

    <div class="control-section">
        <div class="status-bar">

                <span class="status-label">Play Level</span>
                <span class="status-value play-level-value" id="playLevel">40</span>
            </div>

                <span class="status-label">Points</span>
                <span class="status-value points-value" id="points">68380</span>
            </div>
        </div>
        
        <div class="button-bar">
            <button class="game-btn" onclick="game.help()">Help</button>
            <button class="game-btn" onclick="game.nextPuzzle()" id="nextPuzzleBtn">Next Puzzle</button>

            <button class="game-btn play" onclick="game.play()" id="playBtn">Play</button>
        </div>
        
        <div class="footer">
            <span>192.168.26.111:643831</span>
            <span>Copyright 2003-2023 All Rights Reserved</span>
            <span>SKL 402 83 PEN</span>
        </div>
    </div>

    <script>
        const SkillGame = (function() {
            // Symbol images mapping
            const SYMBOL_IMAGES = [
                '/symbols/alon.png',
                '/symbols/oscar.png',
                '/symbols/sky-garbage.png',
                '/symbols/shredder.png',
                '/symbols/gorbios.png',
                '/symbols/pump-pill.png',
                '/symbols/digibin.png',
                '/symbols/box.png',
                '/symbols/matress.png'
            ];
            
            const BASE_PAYOUTS = [20000, 4000, 2000, 400, 200, 80, 40, 20, 10];
            
            const state = {
                balance: 1000,
                playLevel: 1,
                currentWin: 0,
                stage: 'IDLE',
                grid: Array(9).fill(null),
                nextGrid: Array(9).fill(null),
                timer: 30,
                timerInterval: null,
                memorySequence: [],
                playerSequence: [],
                memoryColors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00'],
                canPreview: true,
                previewShown: false
            };
            
            const elements = {
                gridContainer: document.getElementById('gridContainer'),
                statusMessage: document.getElementById('statusMessage'),
                winDisplay: document.getElementById('winDisplay'),
                playLevel: document.getElementById('playLevel'),
                points: document.getElementById('points'),
                timerContainer: document.getElementById('timerContainer'),
                timerBar: document.getElementById('timerBar'),
                playBtn: document.getElementById('playBtn'),
                nextPuzzleBtn: document.getElementById('nextPuzzleBtn')
            };
            
            function initGrid() {
                elements.gridContainer.innerHTML = '';
                elements.gridContainer.appendChild(elements.statusMessage);
                
                for (let i = 0; i < 9; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.dataset.index = i;
                    cell.onclick = () => handleCellClick(i);
                    
                    const symbol = document.createElement('div');
                    symbol.className = 'cell-symbol';
                    symbol.id = `cell-${i}`;
                    
                    cell.appendChild(symbol);
                    elements.gridContainer.appendChild(cell);
                }
            }
            
            function generateGrid() {
                return Array(9).fill(0).map(() => Math.floor(Math.random() * 9));
            }
            
            function handleCellClick(index) {
                if (state.stage === 'PLAYING') {
                    placeWild(index);
                } else if (state.stage === 'MEMORY') {
                    handleMemoryInput(index);
                }
            }
            
            function placeWild(index) {
                clearInterval(state.timerInterval);
                state.grid[index] = 'WILD';
                renderGrid();
                checkWin();
            }
            
            function checkWin() {
                const lines = [
                    [0,1,2], [3,4,5], [6,7,8],
                    [0,3,6], [1,4,7], [2,5,8],
                    [0,4,8], [2,4,6]
                ];
                
                let totalWin = 0;
                const winningLines = [];
                
                lines.forEach(line => {
                    const symbols = line.map(i => state.grid[i]);
                    const unique = [...new Set(symbols)];
                    
                    if (unique.length === 1 && unique[0] !== null) {
                        const tier = unique[0] === 'WILD' ? 0 : unique[0];
                        totalWin += getPayout(tier);
                        winningLines.push(line);
                    } else if (unique.length === 2 && unique.includes('WILD')) {
                        const tier = unique.find(s => s !== 'WILD');
                        totalWin += getPayout(tier);
                        winningLines.push(line);
                    }
                });
                
                if (totalWin > 0) {
                    state.currentWin = totalWin;
                    updateDisplay();
                    highlightWinningLines(winningLines);
                    setTimeout(() => endGame(true), 2000);
                } else {
                    startMemoryGame();
                }
            }
            
            function getPayout(tier) {
                return BASE_PAYOUTS[tier] * state.playLevel;
            }
            
            function updatePaytable() {
                const tierRows = document.querySelectorAll('.tier-row');
                tierRows.forEach((row, index) => {
                    const valueSpan = row.querySelector('.tier-value');
                    valueSpan.textContent = BASE_PAYOUTS[index] * state.playLevel;
                });
            }
            
            function highlightWinningLines(lines) {
                lines.flat().forEach(index => {
                    document.querySelector(`[data-index="${index}"]`).classList.add('winning-cell');
                });
            }
            
            function startMemoryGame() {
                state.stage = 'MEMORY';
                state.memorySequence = [];
                state.playerSequence = [];
                
                for (let i = 0; i < 5; i++) {
                    state.memorySequence.push(Math.floor(Math.random() * 9));
                }
                
                showStatus('Watch the pattern...');
                playMemorySequence();
            }
            
            function playMemorySequence() {
                let i = 0;
                const interval = setInterval(() => {
                    if (i >= state.memorySequence.length) {
                        clearInterval(interval);
                        showStatus('Your turn!');
                        return;
                    }
                    
                    flashCell(state.memorySequence[i]);
                    i++;
                }, 800);
            }
            
            function flashCell(index) {
                const cell = document.querySelector(`[data-index="${index}"]`);
                const circle = document.createElement('div');
                circle.className = 'memory-circle';
                circle.style.background = state.memoryColors[index % 4];
                circle.classList.add('active');
                
                const cellSymbol = cell.querySelector('.cell-symbol');
                const originalContent = cellSymbol.innerHTML;
                cellSymbol.innerHTML = '';
                cellSymbol.appendChild(circle);
                
                setTimeout(() => {
                    cellSymbol.innerHTML = originalContent;
                }, 400);
            }
            
            function handleMemoryInput(index) {
                state.playerSequence.push(index);
                flashCell(index);
                
                const current = state.playerSequence.length - 1;
                if (state.playerSequence[current] !== state.memorySequence[current]) {
                    endGame(false);
                    return;
                }
                
                if (state.playerSequence.length === state.memorySequence.length) {
                    state.currentWin = Math.floor(state.playLevel * 1.05);
                    updateDisplay();
                    setTimeout(() => endGame(true), 1000);
                }
            }
            
            function endGame(won) {
                state.stage = 'IDLE';
                if (won) {
                    state.balance += state.currentWin;
                    showStatus('You Win!');
                } else {
                    state.balance -= state.playLevel;
                    showStatus('Try Again');
                }
                state.currentWin = 0;
                updateDisplay();
                elements.playBtn.textContent = 'Play';
                elements.playBtn.disabled = false;
                
                // Check if player can afford to play
                if (state.balance < state.playLevel) {
                    showStatus('Insufficient Balance!');
                    elements.playBtn.disabled = true;
                }
            }
            
            function updateDisplay() {
                elements.winDisplay.textContent = state.currentWin;
                elements.playLevel.textContent = state.playLevel;
                elements.points.textContent = state.balance;
                updatePaytable();
                
                // Disable level down button if at level 1
                const levelDownBtn = document.querySelector('.game-btn[onclick="game.levelDown()"]');
                if (levelDownBtn) {
                    levelDownBtn.disabled = state.playLevel <= 1;
                }
            }
            
            function showStatus(text) {
                elements.statusMessage.textContent = text;
                elements.statusMessage.classList.remove('hidden');
            }
            
            function hideStatus() {
                elements.statusMessage.classList.add('hidden');
            }
            
            function renderGrid() {
                state.grid.forEach((symbol, index) => {
                    const cell = document.getElementById(`cell-${index}`);
                    const cellDiv = document.querySelector(`[data-index="${index}"]`);
                    
                    if (symbol === 'WILD') {
                        cell.className = 'cell-symbol wild-text';
                        cell.textContent = 'WILD';
                        cellDiv.classList.add('wild');
                        cellDiv.classList.remove('spinning');
                    } else if (symbol !== null) {
                        cell.className = 'cell-symbol';
                        cell.innerHTML = `<img src="${SYMBOL_IMAGES[symbol]}" alt="Symbol ${symbol + 1}">`;
                        cellDiv.classList.remove('wild', 'spinning');
                    } else {
                        cell.className = 'cell-symbol';
                        cell.innerHTML = '';
                        cellDiv.classList.remove('wild', 'spinning');
                    }
                });
            }
            
            function startSpinAnimation() {
                // Add spinning class to all cells with staggered timing
                for (let i = 0; i < 9; i++) {
                    const cellDiv = document.querySelector(`[data-index="${i}"]`);
                    
                    // Stagger the start of each cell's animation
                    setTimeout(() => {
                        cellDiv.classList.add('spinning');
                        
                        // Create a more realistic spinning effect
                        const cell = document.getElementById(`cell-${i}`);
                        let spinCount = 0;
                        const maxSpins = 20 + Math.floor(Math.random() * 15); // Random spin duration
                        
                        const spinInterval = setInterval(() => {
                            const randomSymbol = Math.floor(Math.random() * 9);
                            cell.innerHTML = `<img src="${SYMBOL_IMAGES[randomSymbol]}" alt="Symbol">`;
                            
                            spinCount++;
                            if (spinCount >= maxSpins) {
                                clearInterval(spinInterval);
                            }
                        }, 80 + Math.random() * 40); // Variable speed for realism
                        
                        // Store interval to clear later
                        cellDiv.dataset.spinInterval = spinInterval;
                    }, i * 100); // Stagger by 100ms per cell
                }
            }
            
            function stopSpinAnimation() {
                // Stop spinning with staggered timing (reverse order)
                for (let i = 8; i >= 0; i--) {
                    setTimeout(() => {
                        const cellDiv = document.querySelector(`[data-index="${i}"]`);
                        cellDiv.classList.remove('spinning');
                        
                        if (cellDiv.dataset.spinInterval) {
                            clearInterval(parseInt(cellDiv.dataset.spinInterval));
                            delete cellDiv.dataset.spinInterval;
                        }
                        
                        // Show final symbol with a slight bounce effect
                        const cell = document.getElementById(`cell-${i}`);
                        const finalSymbol = state.grid[i];
                        if (finalSymbol !== null) {
                            cell.innerHTML = `<img src="${SYMBOL_IMAGES[finalSymbol]}" alt="Symbol ${finalSymbol + 1}">`;
                            
                            // Add bounce effect
                            cell.style.transform = 'scale(1.1)';
                            setTimeout(() => {
                                cell.style.transform = 'scale(1)';
                            }, 150);
                        }
                    }, (8 - i) * 150); // Reverse stagger
                }
            }
            
            function startTimer() {
                state.timer = 30;
                elements.timerContainer.classList.add('active');
                
                state.timerInterval = setInterval(() => {
                    state.timer -= 0.1;
                    elements.timerBar.style.width = `${(state.timer / 30) * 100}%`;
                    
                    if (state.timer <= 0) {
                        clearInterval(state.timerInterval);
                        endGame(false);
                    }
                }, 100);
            }
            
            return {
                init: function() {
                    initGrid();
                    updateDisplay();
                },
                
                moreGames: function() {
                    // Removed - no longer needed
                },
                
                help: function() {
                    alert('Place the WILD symbol to complete 3-in-a-row lines. Use Next Puzzle to preview the board. Complete the memory game for guaranteed 105% return!');
                },
                
                nextPuzzle: function() {
                    if (!state.canPreview || state.stage !== 'IDLE') return;
                    
                    state.nextGrid = generateGrid();
                    state.grid = [...state.nextGrid];
                    
                    // Show spin animation
                    startSpinAnimation();
                    
                    // Stop after 2 seconds and show preview
                    setTimeout(() => {
                        stopSpinAnimation();
                        setTimeout(() => {
                            showStatus('Preview - Press Play to confirm');
                            state.previewShown = true;
                            elements.playBtn.textContent = 'Confirm';
                        }, 1200); // Wait for staggered stop animation
                    }, 2000);
                },
                
                levelDown: function() {
                    if (state.playLevel > 1) {
                        state.playLevel -= 1;
                        updateDisplay();
                    }
                },
                
                levelUp: function() {
                    state.playLevel += 1;
                    updateDisplay();
                },
                
                maxLevel: function() {
                    state.playLevel = Math.floor(state.balance);
                    updateDisplay();
                },
                
                play: function() {
                    if (state.stage !== 'IDLE') return;
                    if (state.balance < state.playLevel) {
                        showStatus('Insufficient Balance!');
                        return;
                    }
                    
                    if (state.previewShown) {
                        state.previewShown = false;
                        state.stage = 'PLAYING';
                        hideStatus();
                        startTimer();
                        elements.playBtn.textContent = 'Playing...';
                        elements.playBtn.disabled = true;
                    } else {
                        state.grid = generateGrid();
                        
                        // Show spin animation
                        startSpinAnimation();
                        
                        // Stop after 2.5 seconds and start playing
                        setTimeout(() => {
                            stopSpinAnimation();
                            setTimeout(() => {
                                state.stage = 'PLAYING';
                                hideStatus();
                                startTimer();
                                elements.playBtn.textContent = 'Playing...';
                                elements.playBtn.disabled = true;
                            }, 1200); // Wait for staggered stop animation
                        }, 2500);
                    }
                }
            };
        })();
        
        const game = SkillGame;
        game.init();
    </script>
</body>
</html>
