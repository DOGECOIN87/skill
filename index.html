<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&family=Oswald:wght@700&family=Roboto+Condensed:wght@400;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Roboto Condensed', sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Main Game Container */
        .game-container {
            display: flex;
            flex: 1;
            padding: 10px;
            gap: 10px;
            min-height: 0;
        }
        
        /* Column 1: Paytable Sidebar (20%) */
        .paytable-column {
            width: 20%;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        .tier-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a1a;
            border: 2px solid #444;
            padding: 8px 12px;
            height: 50px;
        }
        
        .tier-label {
            font-family: 'Oswald', sans-serif;
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
        }
        
        .tier-value {
            font-family: 'VT323', monospace;
            font-size: 28px;
            color: #39ff14;
            text-shadow: 0 0 10px #39ff14;
        }
        
        .win-display {
            background: #000;
            border: 3px solid #444;
            padding: 15px;
            text-align: center;
            margin-top: 10px;
        }
        
        .win-label {
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            color: #888;
            text-transform: uppercase;
        }
        
        .win-value {
            font-family: 'VT323', monospace;
            font-size: 48px;
            color: #39ff14;
            text-shadow: 0 0 15px #39ff14;
            line-height: 1;
        }
        
        .more-games-btn {
            margin-top: auto;
            height: 80px;
            background: linear-gradient(to bottom, #555, #333);
            border: 3px solid #777;
            color: #fff;
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 0 #222;
            transition: all 0.1s;
        }
        
        .more-games-btn:hover {
            background: linear-gradient(to bottom, #666, #444);
        }
        
        .more-games-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #222;
        }
        
        /* Columns 2-4: Unified Play Area (80%) */
        .play-area {
            width: 80%;
            display: flex;
            flex-direction: column;
            background: #111;
            border: 3px solid #666;
            position: relative;
        }
        
        .grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 15px;
            padding: 30px;
            position: relative;
        }
        
        .grid-cell {
            background: #1a1a1a;
            border: 2px solid #444;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .grid-cell:hover {
            border-color: #666;
            background: #222;
        }
        
        .grid-cell.active {
            border-color: #39ff14;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
        }
        
        .grid-cell.wild {
            background: rgba(57, 255, 20, 0.2);
            border-color: #39ff14;
        }
        
        .cell-symbol {
            width: 80%;
            height: 80%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'VT323', monospace;
            font-size: 24px;
            color: #fff;
        }
        
        /* Status Message Overlay */
        .status-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Oswald', sans-serif;
            font-size: 32px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 3px;
            pointer-events: none;
            z-index: 10;
        }
        
        .status-message.hidden {
            display: none;
        }
        
        /* Bottom Control Section */
        .control-section {
            background: #000;
            border-top: 3px solid #39ff14;
        }
        
        /* Status Bar (Play Level / Points) */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #0a0a0a;
        }
        
        .status-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .status-label {
            font-family: 'Oswald', sans-serif;
            font-size: 18px;
            color: #888;
            text-transform: uppercase;
        }
        
        .status-value {
            font-family: 'VT323', monospace;
            font-size: 36px;
            padding: 5px 20px;
            background: #000;
            border: 2px solid #444;
            min-width: 100px;
            text-align: center;
        }
        
        .play-level-value {
            color: #ffaa00;
            text-shadow: 0 0 10px #ffaa00;
        }
        
        .points-value {
            color: #39ff14;
            text-shadow: 0 0 10px #39ff14;
        }
        
        /* Button Bar */
        .button-bar {
            display: flex;
            gap: 10px;
            padding: 15px 30px;
            background: #111;
        }
        
        .game-btn {
            flex: 1;
            height: 70px;
            background: linear-gradient(to bottom, #666, #444);
            border: 2px solid #888;
            border-radius: 5px;
            color: #fff;
            font-family: 'Oswald', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 0 #222, inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.05s;
            position: relative;
            overflow: hidden;
        }
        
        .game-btn:hover {
            background: linear-gradient(to bottom, #777, #555);
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #222, inset 0 1px 0 rgba(255,255,255,0.2);
        }
        
        .game-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #222, inset 0 2px 5px rgba(0,0,0,0.5);
        }
        
        .game-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 4px 0 #222;
        }
        
        .game-btn.play {
            background: linear-gradient(to bottom, #00aa00, #006600);
            border-color: #00ff41;
            flex: 1.2;
        }
        
        .game-btn.play:hover {
            background: linear-gradient(to bottom, #00bb00, #007700);
        }
        
        /* Footer */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 30px;
            background: #000;
            font-family: 'Roboto Condensed', sans-serif;
            font-size: 12px;
            color: #555;
        }
        
        /* Timer Bar */
        .timer-container {
            position: absolute;
            top: 10px;
            left: 30px;
            right: 30px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
            display: none;
        }
        
        .timer-container.active {
            display: block;
        }
        
        .timer-bar {
            height: 100%;
            background: linear-gradient(to right, #ff0000, #ffff00, #00ff00);
            width: 100%;
            transition: width 0.1s linear;
        }
        
        /* Memory Game Circles */
        .memory-circle {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            opacity: 0.3;
            transition: opacity 0.2s;
        }
        
        .memory-circle.active {
            opacity: 1;
            box-shadow: 0 0 30px currentColor;
        }
        
        .memory-circle.color-0 { background: #ff0000; color: #ff0000; }
        .memory-circle.color-1 { background: #00ff00; color: #00ff00; }
        .memory-circle.color-2 { background: #0000ff; color: #0000ff; }
        .memory-circle.color-3 { background: #ffff00; color: #ffff00; }
        
        /* Animations */
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .winning-cell {
            animation: pulse 0.5s ease-in-out infinite;
            border-color: #39ff14 !important;
            box-shadow: 0 0 30px #39ff14 !important;
        }
        
        /* Responsive */
        @media (max-width: 1200px) {
            .paytable-column {
                min-width: 150px;
            }
            .tier-value {
                font-size: 22px;
            }
            .game-btn {
                font-size: 14px;
                height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Column 1: Paytable -->
        <div class="paytable-column">
            <div class="tier-row">
                <span class="tier-label">Tier 1</span>
                <span class="tier-value">20000</span>
            </div>
            <div class="tier-row">
                <span class="tier-label">Tier 2</span>
                <span class="tier-value">4000</span>
            </div>
            <div class="tier-row">
                <span class="tier-label">Tier 3</span>
                <span class="tier-value">2000</span>
            </div>
            <div class="tier-row">
                <span class="tier-label">Tier 4</span>
                <span class="tier-value">400</span>
            </div>
            <div class="tier-row">
                <span class="tier-label">Tier 5</span>
                <span class="tier-value">200</span>
            </div>
            <div class="tier-row">
                <span class="tier-label">Tier 6</span>
                <span class="tier-value">80</span>
            </div>
            <div class="tier-row">
                <span class="tier-label">Tier 7</span>
                <span class="tier-value">40</span>
            </div>
            <div class="tier-row">
                <span class="tier-label">Tier 8</span>
                <span class="tier-value">20</span>
            </div>
            <div class="tier-row">
                <span class="tier-label">Tier 9</span>
                <span class="tier-value">10</span>
            </div>
            
            <div class="win-display">
                <div class="win-label">Win</div>
                <div class="win-value" id="winDisplay">0</div>
            </div>
            
            <button class="more-games-btn" onclick="game.moreGames()">More Games</button>
        </div>
        
        <!-- Columns 2-4: Unified Play Area -->
        <div class="play-area">
            <div class="timer-container" id="timerContainer">
                <div class="timer-bar" id="timerBar"></div>
            </div>
            
            <div class="grid-container" id="gridContainer">
                <div class="status-message" id="statusMessage">Adjust 'Play Level'</div>
                <!-- Grid cells generated by JS -->
            </div>
        </div>
    </div>
    
    <!-- Bottom Control Section -->
    <div class="control-section">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-group">
                <span class="status-label">Play Level</span>
                <span class="status-value play-level-value" id="playLevel">40</span>
            </div>
            <div class="status-group">
                <span class="status-label">Points</span>
                <span class="status-value points-value" id="points">68380</span>
            </div>
        </div>
        
        <!-- Button Bar -->
        <div class="button-bar">
            <button class="game-btn" onclick="game.moreGames()">More Games</button>
            <button class="game-btn" onclick="game.help()">Help</button>
            <button class="game-btn" onclick="game.nextPuzzle()" id="nextPuzzleBtn">Next Puzzle</button>
            <button class="game-btn" onclick="game.levelDown()">Level Down</button>
            <button class="game-btn" onclick="game.levelUp()">Level Up</button>
            <button class="game-btn" onclick="game.maxLevel()">Max</button>
            <button class="game-btn play" onclick="game.play()" id="playBtn">Play</button>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <span>192.168.26.111:643831</span>
            <span>Copyright 2003-2023 All Rights Reserved</span>
            <span>SKL 402 83 PEN</span>
        </div>
    </div>

    <script>
        const SkillGame = (function() {
            // Game State
            const state = {
                balance: 68380,
                playLevel: 40,
                currentWin: 0,
                stage: 'IDLE', // IDLE, PREVIEW, PLAYING, MEMORY, RESULT
                grid: Array(9).fill(null),
                nextGrid: Array(9).fill(null),
                timer: 30,
                timerInterval: null,
                memorySequence: [],
                playerSequence: [],
                memoryColors: ['#ff0000', '#00ff00', '#0000ff', '#ffff00'],
                canPreview: true,
                previewShown: false
            };
            
            // DOM Elements
            const elements = {
                gridContainer: document.getElementById('gridContainer'),
                statusMessage: document.getElementById('statusMessage'),
                winDisplay: document.getElementById('winDisplay'),
                playLevel: document.getElementById('playLevel'),
                points: document.getElementById('points'),
                timerContainer: document.getElementById('timerContainer'),
                timerBar: document.getElementById('timerBar'),
                playBtn: document.getElementById('playBtn'),
                nextPuzzleBtn: document.getElementById('nextPuzzleBtn')
            };
            
            // Initialize grid cells
            function initGrid() {
                elements.gridContainer.innerHTML = '';
                elements.gridContainer.appendChild(elements.statusMessage);
                
                for (let i = 0; i < 9; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'grid-cell';
                    cell.dataset.index = i;
                    cell.onclick = () => handleCellClick(i);
                    
                    const symbol = document.createElement('div');
                    symbol.className = 'cell-symbol';
                    symbol.id = `cell-${i}`;
                    
                    cell.appendChild(symbol);
                    elements.gridContainer.appendChild(cell);
                }
            }
            
            // Generate random grid
            function generateGrid() {
                return Array(9).fill(0).map(() => Math.floor(Math.random() * 9));
            }
            
            // Handle cell clicks
            function handleCellClick(index) {
                if (state.stage === 'PLAYING') {
                    placeWild(index);
                } else if (state.stage === 'MEMORY') {
                    handleMemoryInput(index);
                }
            }
            
            // Place wild symbol
            function placeWild(index) {
                clearInterval(state.timerInterval);
                state.grid[index] = 'WILD';
                renderGrid();
                checkWin();
            }
            
            // Check for winning lines
            function checkWin() {
                const lines = [
                    [0,1,2], [3,4,5], [6,7,8], // Horizontal
                    [0,3,6], [1,4,7], [2,5,8], // Vertical
                    [0,4,8], [2,4,6]             // Diagonal
                ];
                
                let totalWin = 0;
                const winningLines = [];
                
                lines.forEach(line => {
                    const symbols = line.map(i => state.grid[i]);
                    const unique = [...new Set(symbols)];
                    
                    // Check for 3 matching or 2 matching + wild
                    if (unique.length === 1 && unique[0] !== null) {
                        // 3 matching
                        const tier = unique[0] === 'WILD' ? 0 : unique[0];
                        totalWin += getPayout(tier);
                        winningLines.push(line);
                    } else if (unique.length === 2 && unique.includes('WILD')) {
                        // 2 matching + wild
                        const tier = unique.find(s => s !== 'WILD');
                        totalWin += getPayout(tier);
                        winningLines.push(line);
                    }
                });
                
                if (totalWin > 0) {
                    state.currentWin = totalWin;
                    updateDisplay();
                    highlightWinningLines(winningLines);
                    setTimeout(() => endGame(true), 2000);
                } else {
                    startMemoryGame();
                }
            }
            
            // Get payout for tier
            function getPayout(tier) {
                const payouts = [20000, 4000, 2000, 400, 200, 80, 40, 20, 10];
                return payouts[tier] || 0;
            }
            
            // Highlight winning lines
            function highlightWinningLines(lines) {
                lines.flat().forEach(index => {
                    document.querySelector(`[data-index="${index}"]`).classList.add('winning-cell');
                });
            }
            
            // Start memory game (safety net)
            function startMemoryGame() {
                state.stage = 'MEMORY';
                state.memorySequence = [];
                state.playerSequence = [];
                
                // Generate sequence
                for (let i = 0; i < 5; i++) {
                    state.memorySequence.push(Math.floor(Math.random() * 9));
                }
                
                showStatus('Watch the pattern...');
                playMemorySequence();
            }
            
            // Play memory sequence
            function playMemorySequence() {
                let i = 0;
                const interval = setInterval(() => {
                    if (i >= state.memorySequence.length) {
                        clearInterval(interval);
                        showStatus('Your turn!');
                        return;
                    }
                    
                    flashCell(state.memorySequence[i]);
                    i++;
                }, 800);
            }
            
            // Flash cell for memory game
            function flashCell(index) {
                const cell = document.querySelector(`[data-index="${index}"]`);
                const circle = document.createElement('div');
                circle.className = 'memory-circle';
                circle.style.background = state.memoryColors[index % 4];
                circle.classList.add('active');
                
                cell.innerHTML = '';
                cell.appendChild(circle);
                
                setTimeout(() => {
                    cell.innerHTML = '';
                }, 400);
            }
            
            // Handle memory input
            function handleMemoryInput(index) {
                state.playerSequence.push(index);
                flashCell(index);
                
                // Check if correct so far
                const current = state.playerSequence.length - 1;
                if (state.playerSequence[current] !== state.memorySequence[current]) {
                    // Wrong - game over
                    endGame(false);
                    return;
                }
                
                // Check if complete
                if (state.playerSequence.length === state.memorySequence.length) {
                    // Success - guaranteed 105% return
                    state.currentWin = Math.floor(state.playLevel * 1.05);
                    updateDisplay();
                    setTimeout(() => endGame(true), 1000);
                }
            }
            
            // End game
            function endGame(won) {
                state.stage = 'IDLE';
                if (won) {
                    state.balance += state.currentWin;
                    showStatus('You Win!');
                } else {
                    state.balance -= state.playLevel;
                    showStatus('Try Again');
                }
                state.currentWin = 0;
                updateDisplay();
                elements.playBtn.textContent = 'Play';
                elements.playBtn.disabled = false;
            }
            
            // Update display
            function updateDisplay() {
                elements.winDisplay.textContent = state.currentWin;
                elements.playLevel.textContent = state.playLevel;
                elements.points.textContent = state.balance;
            }
            
            // Show status message
            function showStatus(text) {
                elements.statusMessage.textContent = text;
                elements.statusMessage.classList.remove('hidden');
            }
            
            // Hide status
            function hideStatus() {
                elements.statusMessage.classList.add('hidden');
            }
            
            // Render grid
            function renderGrid() {
                state.grid.forEach((symbol, index) => {
                    const cell = document.getElementById(`cell-${index}`);
                    const cellDiv = document.querySelector(`[data-index="${index}"]`);
                    
                    if (symbol === 'WILD') {
                        cell.textContent = 'WILD';
                        cellDiv.classList.add('wild');
                    } else if (symbol !== null) {
                        cell.textContent = `T${symbol + 1}`;
                        cellDiv.classList.remove('wild');
                    } else {
                        cell.textContent = '';
                        cellDiv.classList.remove('wild');
                    }
                });
            }
            
            // Timer functions
            function startTimer() {
                state.timer = 30;
                elements.timerContainer.classList.add('active');
                
                state.timerInterval = setInterval(() => {
                    state.timer -= 0.1;
                    elements.timerBar.style.width = `${(state.timer / 30) * 100}%`;
                    
                    if (state.timer <= 0) {
                        clearInterval(state.timerInterval);
                        endGame(false);
                    }
                }, 100);
            }
            
            // Public API
            return {
                init: function() {
                    initGrid();
                    updateDisplay();
                },
                
                moreGames: function() {
                    alert('More games coming soon!');
                },
                
                help: function() {
                    alert('Place the WILD symbol to complete 3-in-a-row lines. Use Next Puzzle to preview the board. Complete the memory game for guaranteed 105% return!');
                },
                
                nextPuzzle: function() {
                    if (!state.canPreview || state.stage !== 'IDLE') return;
                    
                    state.nextGrid = generateGrid();
                    state.grid = [...state.nextGrid];
                    renderGrid();
                    showStatus('Preview - Press Play to confirm');
                    state.previewShown = true;
                    elements.playBtn.textContent = 'Confirm';
                },
                
                levelDown: function() {
                    if (state.playLevel > 10) {
                        state.playLevel -= 10;
                        updateDisplay();
                    }
                },
                
                levelUp: function() {
                    if (state.playLevel < 1000) {
                        state.playLevel += 10;
                        updateDisplay();
                    }
                },
                
                maxLevel: function() {
                    state.playLevel = 1000;
                    updateDisplay();
                },
                
                play: function() {
                    if (state.stage !== 'IDLE') return;
                    
                    if (state.previewShown) {
                        // Confirm preview and start playing
                        state.previewShown = false;
                        state.stage = 'PLAYING';
                        hideStatus();
                        startTimer();
                        elements.playBtn.textContent = 'Playing...';
                        elements.playBtn.disabled = true;
                    } else {
                        // Generate new game
                        state.grid = generateGrid();
                        renderGrid();
                        state.stage = 'PLAYING';
                        hideStatus();
                        startTimer();
                        elements.playBtn.textContent = 'Playing...';
                        elements.playBtn.disabled = true;
                    }
                }
            };
        })();
        
        // Initialize game
        const game = SkillGame;
        game.init();
    </script>
</body>
</html>
